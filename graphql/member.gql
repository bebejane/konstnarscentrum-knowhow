query AllApplicationsByActivity($first: IntType = 100, $skip: IntType = 0, $activityId: ItemId) {
	allApplications(
		first: $first
		skip: $skip
		filter: { activity: { eq: $activityId } }
	) {
		...ApplicationFragment
	}
	_allApplicationsMeta(filter: { activity: { eq: $activityId } }) {
		count
	}
}

fragment ApplicationFragment on ApplicationRecord {
	__typename
	id
	approvalStatus
	member {
		...MemberFragment
	}
}

fragment MemberFragment on MemberRecord {
	__typename
	id
	firstName
	lastName
	email
	phone
	education
	age
	country
	language
	address
	city
	mission
	phone
	postalCode
	social
	sex
	workCategory
	url
	kcMember
	protectedIdentity
	educationThreeYears
	haveWorkedThreeYears
}
