query SiteSearch(
	$activityIds: [ItemId]
	$knowledgeIds: [ItemId]
	$aboutIds: [ItemId]
	$first: IntType = 500
	$skip: IntType = 0
) {
	allActivities(first: $first, skip: $skip, filter: { id: { in: $activityIds } }) {
		__typename
		_modelApiKey
		title
		text: intro(markdown: false)
		slug
		image {
			...ImageThumbnailFragment
		}
	}

	allKnowledges(first: $first, skip: $skip, filter: { id: { in: $knowledgeIds } }) {
		__typename
		_modelApiKey
		title
		text: intro(markdown: false)
		slug
		category {
			id
			category
			slug
		}
		image {
			...ImageThumbnailFragment
		}
	}
	allAbouts(first: $first, skip: $skip, filter: { id: { in: $aboutIds } }) {
		__typename
		_modelApiKey
		title
		text: intro(markdown: false)
		slug
		image {
			...ImageThumbnailFragment
		}
	}
}
